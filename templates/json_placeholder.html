<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON Placeholder Posts</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/json_placeholder.css') }}">

</head>

<body>

<h1>📄 JSON Placeholder Posts</h1>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<div class="container">

{% for post in posts %}

<div class="card">

<h2>{{ post.title }}</h2>

<p><strong>Post ID:</strong> {{ post.id }}</p>

<p><strong>User ID:</strong> {{ post.userId }}</p>

<p>{{ post.body }}</p>

</div>

{% endfor %}

</div>

</body>

</html>
