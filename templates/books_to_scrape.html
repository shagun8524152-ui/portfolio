<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Books To Scrape</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/books_to_scrape.css') }}">

</head>

<body>

<header>

<h1>📚 Books To Scrape</h1>

<p>Static Web Scraping using Python + BeautifulSoup</p>

</header>

<div class="container">

<table>

<thead>

<tr>

<th>S.No</th>

<th>Book Name</th>

<th>Price</th>

<th>Rating</th>

</tr>

</thead>

<tbody>

{% for book in books %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ book.Title }}</td>

<td>{{ book.Price }}</td>

<td>{{ book.Rating }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
